name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Fix paths for GitHub Pages
        run: |
          find dist -name "*.html" -exec sed -i 's|src="/assets/|src="/artricenter-cli/assets/|g' {} \;
          find dist -name "*.html" -exec sed -i 's|href="/assets/|href="/artricenter-cli/assets/|g' {} \;
          find dist -name "*.html" -exec sed -i 's|href="/especialidades|href="/artricenter-cli/especialidades|g' {} \;
          find dist -name "*.html" -exec sed -i 's|href="/club-vida-y-salud|href="/artricenter-cli/club-vida-y-salud|g' {} \;
          find dist -name "*.html" -exec sed -i 's|href="/tratamiento-medico-integral|href="/artricenter-cli/tratamiento-medico-integral|g' {} \;
          find dist -name "*.html" -exec sed -i 's|href="/contactanos|href="/artricenter-cli/contactanos|g' {} \;

      - name: Verify fixes
        run: |
          echo "Checking fixed paths..."
          grep 'href="/artricenter-cli/especialidades' dist/index.html && echo "✓ especialidades paths fixed"
          grep 'src="/artricenter-cli/assets/' dist/index.html && echo "✓ asset paths fixed"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
